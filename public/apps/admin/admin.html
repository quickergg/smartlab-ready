<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLab | Admin Panel</title>
    
    <!-- Shared Styles -->
    <link rel="stylesheet" href="/shared/css/variables.css">
    <link rel="stylesheet" href="/shared/css/components.css">
    
    <!-- App-specific Styles -->
    <link rel="stylesheet" href="/apps/admin/css/admin.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="spinner"></div>
            <p>Loading SmartLab Admin...</p>
        </div>

        <!-- Main App Container -->
        <main class="admin-container" id="admin-container" style="display: none;">
            <!-- Sidebar will be loaded here -->
            <div id="sidebar-container"></div>

            <!-- Main Content Area -->
            <div class="content" id="main-content">
                <!-- Header will be loaded here -->
                <div id="header-container"></div>

                <!-- Dynamic content will be loaded here -->
                <div id="page-content"></div>
            </div>
        </main>

        <!-- Toast Notifications Container -->
        <div id="toast-container" class="toast-container"></div>
        
        <!-- Centralized Modal Container -->
        <div id="modal-container" class="modal-container">
            <div class="modal-content" id="modal-content">
                <!-- Dynamic modal content will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="/shared/js/core/SmartLabCore.js"></script>
    <script src="/shared/js/components/GanttChart.js"></script>
    <script src="/shared/js/components/ScheduleViewer.js"></script>

    <!-- Modal Manager -->
    <script src="/apps/admin/js/modal-manager.js"></script>
    
    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Notification Manager -->
    <script src="/shared/js/pages/NotificationManager.js"></script>
    
    <!-- Admin App Script -->
    <script src="/apps/admin/js/admin-app.js"></script>
</body>
</html>
