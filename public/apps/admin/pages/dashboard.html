<div class="dashboard-page fade-in">

            </div>

                <div class="stats-icon">

                    <p class="stats-number" id="count-facultyCount">-</p>
                </div>

    <div class="card">
        <div class="cardHeader">
            <h3>Quick Actions</h3>
        </div>
        
        <div class="quick-actions-grid">
            <button class="btn btn-primary" onclick="AdminApp.showAddUserModal()">
                <i class="fas fa-user-plus"></i> 
                <span>Add New User</span>
            </button>
            
            <button class="btn btn-info" onclick="AdminApp.openPendingRequests()">
                <i class="fas fa-clock"></i> 
                <span>Review Pending Requests</span>
            </button>
            
            <button class="btn btn-secondary" onclick="AdminApp.showAddScheduleModal()">
                <i class="fas fa-calendar-plus"></i> 
                <span>Add Lab Schedule</span>
            </button>
            
            <button class="btn btn-warning" onclick="AdminApp.navigateToPage('equipment')">
                <i class="fas fa-tools"></i> 
                <span>Equipment Status</span>
            </button>
        </div>
    </div>

    <!-- Recent Activity -->
    <div class="card">
        <div class="cardHeader">
            <h3>Recent Activity</h3>
            <button class="btn btn-link btn-sm" onclick="AdminApp.navigateToPage('reports')">
                View All <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        
        <div class="activity-feed" id="recent-activity">
            <div class="activity-item activity-item--loading">

                    <div class="activity-loading">Loading recent activity...</div>
                </div>
            </div>
        </div>
