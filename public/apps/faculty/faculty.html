<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLab | Faculty Panel</title>
    
    <!-- Shared Styles -->
    <link rel="stylesheet" href="/shared/css/variables.css">
    <link rel="stylesheet" href="/shared/css/components.css">
    
    <!-- App-specific Styles -->
    <link rel="stylesheet" href="/apps/faculty/css/faculty.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="spinner"></div>
            <p>Loading SmartLab Faculty...</p>
        </div>

        <!-- Main App Container -->
        <main class="admin-container" id="faculty-container" style="display: none;">
            <!-- Sidebar will be created by FacultyApp -->
            <div id="sidebar-container"></div>

            <!-- Main Content Area -->
            <div class="content" id="main-content">
                <!-- Header will be created by FacultyApp -->
                <div id="header-container"></div>

                <!-- Dynamic page content loaded here -->
                <div id="page-content"></div>
            </div>
        </main>

        <!-- Toast Notifications Container -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- Core Scripts -->
    <script src="/shared/js/core/SmartLabCore.js"></script>
    <script src="/shared/js/components/GanttChart.js"></script>
    <script src="/shared/js/components/FormValidator.js"></script>
    <script src="/shared/js/templates/BorrowRequestForm.js"></script>
    <script src="/shared/js/pages/BorrowRequestController.js"></script>
    <script src="/shared/js/pages/RequestConflictHelper.js"></script>
    <script src="/shared/js/pages/MyRequestsTable.js"></script>
    <script src="/shared/js/components/ScheduleViewer.js"></script>
    
    <!-- Shared Utilities -->
    <script src="/shared/js/utils/ConflictChecker.js"></script>
    
    <!-- Notification Manager -->
    <script src="/shared/js/pages/NotificationManager.js"></script>
    
    <!-- Faculty App Script -->
    <script src="/apps/faculty/js/faculty-app.js"></script>
</body>
</html>
